[package]
authors = ["trangar <Victor 'Trangar' Koenders>"]
edition = "2018"
name = "pixelflut"
version = "0.1.0"

[dependencies]
clap = "2.33"
num_cpus = "1.10"
time = "0.1"
mio = { version = "0.6", default-features = false }
